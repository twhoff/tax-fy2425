h_and_r_block_questions:
  - "Should the internet rows be excluded because WFH fixed-rate method includes internet/phone, or is H&R Block using actual-cost treatment for any period?"
  - "Should Thomas software rows be allocated to Tizzi P8 or employee D5, and how do we prevent duplicate Replit/ChatGPT claims?"
  - "How should the Microsoft*Store/MSBill $49.95 row be treated given the visible 1Password invoice is $65.84?"
  - "Which Amazon/IKEA/Officeworks assets should be included, and at what business/work-use percentage, after first-used/ready-for-use timing checks?"
  - "Can bank statements substantiate Maid To Clean rows, or are supplier invoices/floor-area records required before claiming?"
  - "Should any Isabelle streaming/event rows survive after work-purpose review, and at what apportionment?"
  - "Can Bailey Nelson optometry be claimed in any circumstance relevant to Thomas or Isabelle, or should it be rejected?"

household_questions:
  - "Can you supply or confirm no ANZ/NAB credit-card statements are needed for 1 Jul 2024 to 8 Sep 2024?"
  - "Can you check Apple purchase history for 14/02/2025 $15.00 and 23/06/2025 $63.98?"
  - "Were any MYKI, parking or Uber trip rows specifically for work meetings rather than private travel?"
  - "Do you have receipts for BeforeSunset AI, OpenArt AI, direct OpenAI/ChatGPT, Maid To Clean, or any missing Amazon/IKEA work items?"
  - "Do you have any professional memberships, union fees, phone bills, income-protection premiums, optometry work requirements, COVID tests, or design-tool subscriptions outside the scanned accounts?"

status_summary: >-
  The generated bank summaries are useful but stale/over-inclusive in places.
  Bank Australia full-year coverage is now verified and Cancer Council is found.
  ANZ credit-card coverage before 9 Sep 2024 remains the main statement gap.
  The receipt matcher has multiple false positives and should not be used
  automatically. Confirmed items are mostly DGR donations and receipt-backed
  Replit/Amazon/Officeworks assets, while internet, streaming/events,
  cleaning, IKEA, software allocation, Apple unknowns and missed-deduction
  scans remain either rejected, household questions or H&R Block questions as
  classified above.