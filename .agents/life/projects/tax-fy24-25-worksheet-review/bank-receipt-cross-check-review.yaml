receipt_matcher_sanity_check:
  status: unreliable_for_automatic_use
  finding: "transaction_crossref.csv and transaction_receipt_crossref.md include obvious false positives from loose date/merchant matching. These should not be relied on without manual receipt review."
  obvious_false_positive_examples:
    - "Aussie Broadband internet rows matched to Hayu, Ring, Cheek Media and Cleanup receipts."
    - "OpenAI rows matched to Spotify Audiobooks, projector screen and Replit receipts."
    - "Disney+ matched to a Cleanup receipt."
    - "UNICEF and Bravehearts donations matched to a Cleanup receipt."
    - "The cross-reference points 15 Dec 2024 Officeworks rows to a Thomas receipt path that is not present; the visible receipt file is under Isabelle deductions."
  action: "Use receipt filenames and direct receipt/PDF evidence manually; treat generated matches only as a lead."

