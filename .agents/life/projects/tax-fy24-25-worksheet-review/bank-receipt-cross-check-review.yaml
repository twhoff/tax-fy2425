      - "2. Deductions/Thomas/250616 - Bravehearts Donation Receipt.pdf"
      - "2. Deductions/Isabelle/250522 - Cancer Council Donation Receipt.pdf"
      - ".agents/life/resources/tax-fy24-25/source-register.yaml"
    finding: "UNICEF, Bravehearts and Cancer Council Victoria now have receipt/DGR support; Cancer Council is also present in the full-year Bank Australia CSV, resolving the older prose note that it was not found in bank statements."
    next_step: "Allocate owner correctly: Thomas for UNICEF/Bravehearts; Isabelle for Cancer Council. Avoid double counting SEEK salary-sacrifice giving."
  - id: internet-phone
    status: rejected_for_current_method
    transactions: "9 Aussie Broadband rows, gross $945.00, generated deductible $614.25 at 65%."
    evidence:
      - "5. Bank Statements/Analysis/deductible_transactions_v2.csv"
      - ".agents/life/resources/tax-fy24-25/source-register.yaml"
    finding: "The generated CSV includes internet as deductible, but ATO WFH fixed-rate source says internet and phone are included in the fixed rate. Prior reviews use the fixed-rate method, so separate internet/phone should be excluded unless H&R Block switches to actual-cost treatment."
    next_step: "Carry as H&R Block method consistency question, not as a confirmed deduction."
  - id: software-subscriptions-thomas
    status: mixed_confirmed_and_h_and_r_block_question
    transactions:
      - "Replit direct rows $23.98, $80.02, $81.35 have receipts in Thomas deductions."
      - "OpenAI direct rows $18.36, $35.54, $35.13 have bank evidence; Apple-billed ChatGPT components are separately noted and create double-count risk."
      - "BeforeSunset AI $131.08 and OpenArt AI $134.48 have bank/highlight evidence but no receipt file found by filename search."
      - "Microsoft*Store/MSBill $49.95 is labelled 1Password/Microsoft 365 in generated notes, but the visible 1Password invoice is $65.84 and dated January."
    evidence:
      - "2. Deductions/Thomas/250607 - Replit Receipt.pdf"
      - "2. Deductions/Thomas/250613 - Replit Receipt.pdf"
      - "2. Deductions/Thomas/250622 - Replit Receipt.pdf"
      - "2. Deductions/Thomas/250114 - 1Password Invoice.pdf"
      - "5. Bank Statements/Analysis/highlighted_transactions.csv"
    finding: "Replit is receipt-backed. OpenAI/BeforeSunset/OpenArt are plausible Thomas/Tizzi candidates but need receipts/work-use confirmation. 1Password/Microsoft row needs reconciliation because receipt and bank amounts do not match. GitHub Copilot, WARP Terminal, Medium and LinkedIn Premium were not found by filename or transaction keyword scan."
    next_step: "Ask H&R Block whether these belong in Tizzi P8 or employee D5, and ensure no duplicate Replit/ChatGPT claims across schedules."
  - id: apple-transactions
    status: mixed_rejected_and_household_question
    finding: "Apple analysis in the prose cross-check separates Thomas iCloud, Apple-billed ChatGPT components, unknown Apple rows, and personal Apple subscriptions. The two unknown rows remain 14/02/2025 $15.00 and 23/06/2025 $63.98."
    next_step: "Confirm Apple purchase history for the two unknown rows; keep personal Apple subscriptions rejected; avoid duplicate ChatGPT claims where Apple-billed components overlap direct OpenAI rows."
