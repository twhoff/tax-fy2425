review_items:
  - id: B1-SCRATCH-PAYG
    area: income
    status: h_and_r_block_question
    evidence:
      - "1. Income/Isabelle/250630 - SCRATCH PAYG Statement FY24-25.pdf"
    source_topics:
      - income-etp-allowances-interest-dividends
    finding: "SCRATCH PAYG gross of $111,470.05 matches the worksheet. The income statement also reports a separate $1,199.64 Home Office allowance. ATO source says an allowance reported on an annual income statement must be included as income and does not create an automatic deduction."
    action: "Ask H&R Block to confirm Isabelle's own return includes the $1,199.64 Home Office allowance correctly and that any related deductions are based on actual deductible expenses and records."
  - id: B1-BANK-INTEREST
    area: income
    status: deferred_to_shared_household_review
    evidence:
      - "5. Bank Statements/FY24-25/250630 - Interest details - Bank Australia.pdf"
    finding: "Worksheet uses $17.48 as Isabelle's 50% share of the $34.96 joint Bank Australia interest. Shared account treatment is better resolved under TaxFY2425-c6j.7."
    action: "Carry forward to shared household review."
  - id: B1-VDHG
    area: income
    status: household_question
    evidence:
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md"
    finding: "Thomas's H&R Block draft shows VDHG with 2 account holders and a 50% share, but Isabelle's own H&R Block draft or Vanguard AMMA/SDS statement was not found."
    action: "Confirm whether VDHG is jointly held and obtain Isabelle's own return or Vanguard tax statement before finalising."
  - id: B1-HELP-HECS
    area: income
    status: h_and_r_block_question
    evidence:
      - "1. Income/Isabelle/250630 - SCRATCH PAYG Statement FY24-25.pdf"
    source_topics:
      - help-hecs-study-loans
    finding: "The PAYG statement shows total PAYGW of $34,312 but no separate HELP-specific withholding line in the extracted text. ATO 2024-25 HELP repayment rates mean Isabelle's likely repayment income range could trigger a compulsory repayment if a debt remained, but debt-cleared timing and final repayment income are not confirmed."
    action: "Ask Isabelle/H&R Block to confirm whether a HELP debt remained at assessment, whether payroll continued withholding after the debt was cleared, and how any excess withholding/refund is handled on Isabelle's own return."
  - id: B2-WFH
    area: deductions
    status: household_question
    evidence:
      - "260315 - Deduction Review Worksheet.md"
    source_topics:
      - wfh-fixed-rate-2024-25
      - income-etp-allowances-interest-dividends
    finding: "WFH hours are still TBD. The $1,199.64 Home Office allowance does not itself substantiate a deduction; WFH fixed-rate claims need actual recorded hours and covered expenses cannot be separately claimed again."
    action: "Collect Isabelle's actual WFH hours/records and ask H&R Block how the home-office allowance was treated against WFH deductions."
  - id: B2-STREAMING-RESEARCH
    area: deductions
    status: h_and_r_block_question
    evidence:
      - "260315 - Bank Statement Deduction Cross-Check.md"
      - "5. Bank Statements/Analysis/deductible_transactions_v2.csv"
      - "2. Deductions/Isabelle/240715 - Paramount Plus Subscription.pdf"
      - "2. Deductions/Isabelle/240726 - Hayu Subscription.pdf"
      - "2. Deductions/Isabelle/241218 - YouTube Premium Subscription.pdf"
    source_topics:
      - employee-work-expenses-tools-software-self-education
      - records-substantiation
    finding: "ATO digital-information/subscription source requires a sufficient connection to current employment duties and apportionment for private use. The proposed 30% streaming claim is apportionment-heavy, not fully matched between CSV and prose summaries, and needs Isabelle's platform-by-platform work purpose."
    action: "Do not treat the 30% streaming claim as confirmed. Ask H&R Block whether to claim, reduce, or remove each platform after Isabelle provides specific work-use examples and records."
  - id: B2-CONFERENCES-EVENTS
    area: deductions
    status: h_and_r_block_question
    evidence:
      - "260315 - Bank Statement Deduction Cross-Check.md"
      - "5. Bank Statements/Analysis/deductible_transactions_v2.csv"
    source_topics:
      - records-substantiation
      - employee-work-expenses-tools-software-self-education
    finding: "The bank analysis lists $81.00 of events at 100% work use, but event names/purposes are not evidenced beyond merchant names."
    action: "Ask Isabelle what each event was and ask H&R Block whether each is deductible as work-related professional development/research or should be removed as private entertainment."
