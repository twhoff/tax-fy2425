  - "The worksheet's CCS margin should be recalculated after all return inputs are confirmed in TaxFY2425-c6j.9; no CCS statement was found in 4. Family and no CCS lodgement attachment is needed for the tax return based on the balancing source."

review_items:
  - id: A7-B5-NIB-PHI
    area: private_health_insurance
    status: confirmed_subject_to_isabelle_return_entry
    evidence:
      - "3. Health Insurance/250630 - Nib-health-insurance-tax-statement-THOMAS.pdf"
      - "3. Health Insurance/250630 - Nib-health-insurance-tax-statement-ISABELLE.pdf"
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md"
    source_topics:
      - private-health-medicare-mls-rebate
    finding: "Both NIB statements show membership 23913733, 365 days appropriate private patient hospital cover, premium rows $1,708 benefit code 30 and $594 benefit code 31, and rebate received $0. Thomas's H&R draft matches those rows. Isabelle's own H&R draft is still missing."
    action: "Ask H&R Block to confirm Isabelle's return has the same NIB statement rows from Isabelle's own statement and that the rows are not combined or entered under the wrong taxpayer."
  - id: A7-B5-MLS-REBATE-TIER
    area: private_health_insurance
    status: source_verified
    evidence:
      - "260315 - Deduction Review Worksheet.md"
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md"
    source_topics:
      - private-health-medicare-mls-rebate
    finding: "ATO MLS and PHI rebate threshold pages place a 2024-25 family at Tier 3 from $302,001 or more, with a $1,500 threshold increase for each MLS dependent child after the first. ATO PHI rebate rates show Tier 3 rebate is 0.000%. NIB reports $0 rebate received, which is consistent with Tier 3."
    action: "Keep rebate received as $0. The MLS exemption position depends on the 365 days appropriate private patient hospital cover already evidenced by NIB."
  - id: A8-DIVISION-293
    area: division_293
    status: source_verified_separate_assessment_expected
    evidence:
      - "260315 - Deduction Review Worksheet.md"
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md"
    source_topics:
      - division-293
    finding: "ATO says Division 293 applies when combined Division 293 income and concessional super contributions exceed $250,000, and is 15% of the excess over the threshold or taxable super contributions, whichever is less. The ATO sends a Division 293 notice after receiving the tax return and super fund contribution information."
    action: "Treat the H&R Block Division 293 warning as expected for Thomas, but leave the final amount to ATO assessment or TaxFY2425-c6j.9 scenario calculation once concessional contributions are confirmed."
  - id: A8-SPOUSE-DETAILS
    area: spouse_details
    status: unresolved_until_isabelle_return
    evidence:
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md"
      - "1. Income/Isabelle/250630 - SCRATCH PAYG Statement FY24-25.pdf"
    source_topics:
      - income-etp-allowances-interest-dividends
    finding: "Thomas's draft records Isabelle's taxable income as $110,118 and spouse full-year status as yes. Isabelle's SCRATCH PAYG gross is $111,470.05 plus a separate $1,199.64 Home Office allowance, so Isabelle's own return is required to explain the final taxable income and allowance treatment."
    action: "Ask H&R Block to confirm spouse fields against Isabelle's own return, including taxable income, reportable fringe benefits, reportable super contributions, target foreign income, net investment losses, and any HELP-related details."
  - id: DEPENDANTS-INCOME-TESTS
    area: dependants
    status: h_and_r_block_question
    evidence:
      - "260315 - Deduction Review Worksheet.md"
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md"
    source_topics:
      - private-health-medicare-mls-rebate
    finding: "Household facts list Harlow and Oliver as dependent children, and ATO MLS/PHI threshold sources use a child-after-first threshold uplift. Thomas's H&R draft income-test section shows 'Number of dependent children' as 0. Because income-test labels can be return-field specific, do not manually change it without H&R Block confirmation."
    action: "Ask H&R Block whether the draft's dependent-children field should be 0 or 2, and whether any separate MLS/PHI family/dependant fields already capture Harlow and Oliver."
  - id: C1-CCS-TIMING
    area: centrelink_reconciliation
    status: source_verified_for_timing
    evidence:
      - "260315 - Deduction Review Worksheet.md"
    source_topics:
      - ccs-ftb-centrelink-reconciliation
    finding: "Services Australia says CCS is balanced from mid-August after family income is confirmed; where taxpayers lodge returns, the ATO tells Services Australia the incomes and Services Australia uses that information to balance CCS."
    action: "Separate CCS balancing from the tax-return lodgement pack. Recalculate the worksheet's CCS threshold/margin in TaxFY2425-c6j.9 after confirmed taxable income/ATI inputs."
  - id: C2-FTB-TIMING
    area: centrelink_reconciliation
    status: source_verified_for_timing
    evidence:
      - "260315 - Deduction Review Worksheet.md"
      - "4. Family/"
    source_topics:
      - ccs-ftb-centrelink-reconciliation
    finding: "Services Australia says FTB is balanced after the financial year ends and after the last payment, using income from tax returns where returns are lodged. Services Australia also says FTB and CCS are balanced separately. No family documents were found under 4. Family in this worktree."
    action: "Ask the household whether FTB was received. If yes, treat it as post-lodgement Services Australia reconciliation rather than an H&R Block worksheet attachment unless H&R Block requests details."
  - id: C3-BANK-ACCOUNT-ASSUMPTIONS
    area: accounts_and_income_sources
    status: household_confirmation_needed
    evidence:
      - "5. Bank Statements/FY24-25/250630 - Interest details - Bank Australia.pdf"
      - "5. Bank Statements/Analysis/bank_australia_transactions.csv"
      - "5. Bank Statements/Analysis/all_transactions.csv"
      - "5. Bank Statements/FY24-25/Transactions_2024-07-01_2024-09-30.csv"
    finding: "Worksheet assumptions are Bank Australia joint savings interest split 50/50, Bendigo offset not taxable, ANZ credit card no interest income, and no BOQ, term deposits, crypto, foreign accounts or rental income. Bank coverage and transaction reconciliation are deliberately deferred to TaxFY2425-c6j.8."
    action: "Ask household to confirm no additional income-bearing accounts or investments. Carry bank coverage conflicts into TaxFY2425-c6j.8."

