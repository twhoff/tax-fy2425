      isabelle_spouse_taxable_income_in_thomas_draft: "110118"
      combined_taxable_income: "356316"
    finding: "The worksheet's combined taxable-income figure ties to the Thomas draft inputs, but final combined ATI for CCS/FTB and MLS must wait for Isabelle's own return and TaxFY2425-c6j.9 recalculation."
  - id: mls-family-tier3-scenario
    method: "Python Decimal arithmetic from ATO 2024-25 MLS threshold table"
    figures:
