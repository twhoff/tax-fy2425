  - id: d4-self-education
    return_section: D4 Work-related self-education expenses
    h_and_r_block_amounts:
      thecenteredlife: 48
      audiobooks_professional_development: 99
      total_display: 147
    evidence_amounts:
      thecenteredlife_bank_amount: 48.43
      audible_receipts_count: 6
      audible_amount_each: 16.45
      audible_total: 98.70
      deterministic_total: 147.13
    source_rules:
      - employee-work-expenses-tools-software-self-education
      - records-substantiation
    classification: h_and_r_block_and_household_question
    result: >-
      H&R Block's rounded D4 total ties to the bank/receipt amounts. The claim
      still needs a clear current-employment connection: TheCenteredLife must be
      more than general productivity, and the Audible titles need to be identified
      as work-related professional development rather than personal listening.
    risks:
      - "TheCenteredLife receipt evidence was not found in the Thomas deduction folder; bank evidence alone is weaker substantiation."
      - "If the Audible charges are the same $16.45 x 6 also listed in H&R Block D5 subscription detail as 'Adobe', there is a possible duplicate claim."

  - id: d5-wfh-fixed-rate
    return_section: D5 Other work-related expenses
    h_and_r_block_amounts:
      recorded_hours: 808
      rate_per_hour: 0.70
      claimed_display: 566
    evidence_amounts:
      deterministic_claim: 565.60
      atlassian_hours: 408
      seek_hours: 400
    source_rules:
      - wfh-fixed-rate-2024-25
      - records-substantiation
    classification: confirmed_if_household_hours_records_exist
    result: >-
      H&R Block's WFH amount is consistent with 808 actual hours at the FY2024-25
      fixed rate of 70 cents per hour, subject to Thomas having actual-hour
      records and confirming the Atlassian/SEEK WFH assumptions.
    risks:
      - "The worksheet's Internet note appears to misread the H&R Block $808 as internet at 70%; the draft line is WFH hours x 70c, not a separate internet claim."
      - "ATO fixed-rate rules include home/mobile internet, phone usage, energy, stationery and computer consumables, so the separate bank-analysis internet amount should not be added if fixed rate is used."

  - id: d5-internet-phone
    return_section: D5 Other work-related expenses
    h_and_r_block_amounts:
      visible_separate_internet_claim: null
    evidence_amounts:
      aussie_broadband_payments_count: 9
      gross_total: 945.00
      bank_analysis_work_percent: 65
      bank_analysis_deductible_amount: 614.25
    source_rules:
      - wfh-fixed-rate-2024-25
    classification: reject_separate_claim_if_fixed_rate_used
    result: >-
      The bank analysis can support the gross cost if the actual-cost method were
      used, but it should not be claimed separately while claiming WFH fixed rate.
      H&R Block's visible draft does not show a separate internet line, which is
      consistent with the fixed-rate method.

