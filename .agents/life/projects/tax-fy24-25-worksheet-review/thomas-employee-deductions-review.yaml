    classification: h_and_r_block_question_and_substantiation_risk
    result: >-
      H&R Block's cleaning calculation ties to four $132.13 cleans at 25%, but
      the bank cross-check summary says five cleans. The $425 office item is not
      clearly reconciled to the available bank-analysis officeworks total of
      $52.48 and needs source explanation. Cleaning is unusual but may be
      separately claimable only for a dedicated home office, with defensible floor
      area and invoices.
