      receipt_date: "2025-01-21"
      receipt_addressee: "MASON, ISABELLE"
      receipt_total_paid: 428.00
      simple_half_share: 214.00
    source_rules:
      - tax-agent-fees
      - records-substantiation
    classification: allocation_question
    result: >-
      The ATO source supports claiming costs incurred to manage the taxpayer's own
      tax affairs, including lodging through a registered tax agent, generally in
      the year paid. A receipt exists for $428 paid to H&R Block on 2025-01-21,
