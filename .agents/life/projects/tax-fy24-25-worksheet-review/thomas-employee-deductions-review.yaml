  - "Please confirm whether the $16.45 x 6 subscription detail shown in D5 as 'Adobe' is actually the same Audible amount already claimed at D4. If yes, remove the duplicate."
  - "Please confirm there is no separate internet claim in D5 while using the WFH fixed-rate method. The draft appears to use 808 hours x $0.70, not internet, which is correct if fixed rate is used."
  - "Please reconcile D5 subscriptions: Replit $80.08 vs bank/receipt $80.02, ChatGPT $75.54 vs bank $35.54, Password Security $68.84 vs available $49.95, and BeforeSunset $131.08 excluded from the H&R detail."
  - "Please confirm which software belongs to employee D5 versus the Tizzi P8 business schedule, and ensure no subscription is claimed in both places."
  - "Please confirm ongoing work use and disposal/replacement treatment for the old iPhone 12 now that iPhone 16 Pro appears on the Tizzi schedule."
  - "Please explain the D5 $425 office item and provide the matching receipt or depreciation/work-use treatment."
  - "Please confirm cleaning uses four or five Maid to Clean invoices, confirm the 25m2/100m2 floor-area basis, and whether H&R Block is comfortable with the dedicated-home-office cleaning claim."
  - "Please remove or explain the $12 SEEK salary-sacrifice/workplace-giving amount in D9, because ATO guidance says salary-sacrifice donations cannot be claimed as gifts or donations."
  - "Please confirm the $204 D10 tax-agent-fee allocation. The available H&R Block receipt is addressed to Isabelle and totals $428 paid on 21 Jan 2025, so a simple 50/50 split would be $214 rather than $204."

