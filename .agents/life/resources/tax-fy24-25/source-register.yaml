        fy_relevance: "Current ATO PHI rebate threshold page with explicit 2024-25 income threshold and rebate rate tables."
        exact_claim: >-
          Private health insurance rebate entitlement is income tested against
          income for surcharge purposes and depends on family status at 30 June
          and the age of the oldest person covered by the policy. For 2024-25,
          the family threshold is base tier $194,000 or less, Tier 1 $194,001 to
          $226,000, Tier 2 $226,001 to $302,000, and Tier 3 $302,001 or more;
          the family income threshold is increased by $1,500 for each MLS
          dependent child after the first. For 2024-25, the Tier 3 rebate rate is
          0.000% for all listed age bands. If a policy covers more than one
