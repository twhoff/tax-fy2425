  - id: business-simpler-depreciation-instant-asset-write-off
    title: Tizzi business expenses, simplified depreciation, and instant asset write-off
    worksheet_refs:
      - "260315 - Deduction Review Worksheet.md:218"
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md:345"
    downstream_issues:
      - TaxFY2425-c6j.5
      - TaxFY2425-c6j.9
    questions_to_answer:
      - Is Tizzi eligible for the claimed business asset treatment?
      - Which asset threshold and date rules apply for FY2024-25?
      - How are private-use percentages handled?
    sources:
      - authority: ATO
        title: Simpler depreciation for small business
        url: "https://www.ato.gov.au/businesses-and-organisations/income-deductions-and-concessions/depreciation-and-capital-expenses-and-allowances/simpler-depreciation-for-small-business/instant-asset-write-off"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO instant asset write-off page; page states 1 July 2023 to 30 June 2026 limit and includes 2024-25 examples."
        exact_claim: >-
          Eligible businesses can claim an immediate deduction for the business
          portion of the cost of an asset in the year it is first used or
          installed ready for use. For assets first used or installed ready for
          use from 1 July 2023 to 30 June 2026, the relevant limit is $20,000.
          Eligibility depends on aggregated turnover, purchase date, first-use or
          ready-for-use date, and the asset cost being less than the limit. To
          work out the deduction, subtract any private-use portion; the full asset
          cost must still be under the limit.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: $20,000 instant asset write-off for 2024-25
        url: "https://www.ato.gov.au/businesses-and-organisations/small-business-newsroom/$20000-instant-asset-write-off-for-2024-25"
        access_date: "2026-05-13"
        fy_relevance: "ATO small business newsroom article last updated 6 May 2025, explicitly about the 2024-25 income year."
        exact_claim: >-
          The instant asset write-off limit is $20,000 for the 2024-25 income
          year. A business with aggregated annual turnover less than $10 million
          that uses simplified depreciation may immediately deduct the business
          part of eligible depreciating assets costing less than $20,000 that are
          first used or installed ready for use for a taxable purpose between
          1 July 2024 and 30 June 2025. The usual deduction rules still apply:
          only the business part can be claimed and records must prove the claim.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Home-based business expenses - sole trader or partnership
        url: "https://www.ato.gov.au/businesses-and-organisations/income-deductions-and-concessions/income-and-deductions-for-business/deductions/deductions-for-home-based-business-expenses/home-based-business-expenses-sole-trader-or-partnership"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO sole trader home-based business expense page, last updated 3 July 2025."
        exact_claim: >-
          Sole traders can claim home-based running expenses where they run a
          business from home, including cleaning costs and decline in value or
          repairs of business equipment. Running expense methods must be
          reasonable, exclude private normal living costs, and be supported by
          records. For depreciating assets, private use must be apportioned; a
          representative 4-week diary can support business/private use.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Records required for your business's tax return - deductions
        url: "https://www.ato.gov.au/businesses-and-organisations/preparing-lodging-and-paying/record-keeping-for-business/detailed-business-record-keeping-requirements/running-your-business-records/income-tax-return-records-business/business-deductions-records"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO business deduction record-keeping page for business income tax return records."
        exact_claim: >-
          To claim deductions for business expenses, records must substantiate the
          claim and show how the business-use proportion of relevant expenses was
          worked out. For home-based business expenses, examples include tax
          invoices or receipts, utility/cleaning bills, diaries, and evidence of
          calculations. For other business expenses, examples include receipts,
          tax invoices, credit-card vouchers, purchase records, worksheets and
          diaries.
        confidence: high
        status: source_fetched

  - id: non-commercial-losses
    title: Non-commercial losses and deferred Tizzi loss
    worksheet_refs:
      - "260315 - Deduction Review Worksheet.md:242"
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md:241"
      - "7. HR Block Worksheet (Draft)/J0178900 - 2025 I Form (Worksheets).md:311"
    downstream_issues:
      - TaxFY2425-c6j.5
      - TaxFY2425-c6j.9
      - TaxFY2425-c6j.10
    questions_to_answer:
      - Should the Tizzi loss be deferred rather than deducted this year?
      - Which non-commercial loss test or exception applies or fails?
    sources:
      - authority: ATO
        title: Non-commercial losses
        url: "https://www.ato.gov.au/businesses-and-organisations/income-deductions-and-concessions/losses/non-commercial-losses/how-to-defer-your-losses"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO non-commercial loss deferral page, last updated 7 April 2025."
        exact_claim: >-
          If a business activity loss cannot be deducted in the current year, it
          can be deferred for use in a later year. There is no time limit on how
          long losses can be deferred; they can be offset later against profit
          from the business activity, if non-commercial loss requirements are met,
          or if the Commissioner exercises discretion.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Four tests
        url: "https://www.ato.gov.au/businesses-and-organisations/income-deductions-and-concessions/losses/non-commercial-losses/offset-or-defer-the-loss-individuals-or-sole-traders/four-tests"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO non-commercial loss four-tests page, last updated 7 April 2025."
        exact_claim: >-
          To offset a business loss against other income, an individual or sole
          trader who meets the income requirement must pass one or more of four
          tests. The assessable income test requires at least $20,000 assessable
          income from the business activity for the financial year; the profits
          test requires a tax profit in 3 out of the past 5 years; the real
          property test requires at least $500,000 real property used on a
          continuing basis; and the other assets test requires at least $100,000
          of other business assets used on a continuing basis.
        confidence: high
        status: source_fetched

  - id: private-health-medicare-mls-rebate
    title: Private health insurance, Medicare levy surcharge, and rebate tier
    worksheet_refs:
