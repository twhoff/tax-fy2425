    sources:
      - authority: ATO
        title: Medicare levy surcharge
        url: "https://www.ato.gov.au/individuals-and-families/medicare-and-private-health-insurance/medicare-levy-surcharge"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO MLS hub with links to thresholds, family/dependant rules, and return instructions."
        exact_claim: >-
          The fetched page is the ATO hub for when MLS is paid, family/dependant
          rules, income thresholds and rates, and tax-return reporting.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Paying the Medicare levy surcharge
        url: "https://www.ato.gov.au/individuals-and-families/medicare-and-private-health-insurance/medicare-levy-surcharge/paying-the-medicare-levy-surcharge"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO MLS liability page, fetched while reviewing FY2024-25 return entries."
        exact_claim: >-
          A taxpayer may have to pay MLS if they, their spouse and dependent
          children do not have an appropriate level of private patient hospital
          cover and they earn above the relevant income threshold. If appropriate
          private patient hospital cover is held for the taxpayer, spouse and all
          dependants, the taxpayer will not pay MLS. The ATO works out MLS from
          tax-return information and includes any MLS with the Medicare levy on
          the notice of assessment.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Medicare levy surcharge income, thresholds and rates
        url: "https://www.ato.gov.au/individuals-and-families/medicare-and-private-health-insurance/medicare-levy-surcharge/medicare-levy-surcharge-income-thresholds-and-rates"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO MLS threshold page with explicit 2024-25 income threshold table."
        exact_claim: >-
          For 2024-25, the MLS family threshold is base tier $194,000 or less,
          Tier 1 $194,001 to $226,000, Tier 2 $226,001 to $302,000, and Tier 3
          $302,001 or more. MLS rates are 0%, 1%, 1.25% and 1.5%. The family
          income threshold is increased by $1,500 for each MLS dependent child
          after the first. If the taxpayer has a spouse, combined income for MLS
          purposes is used; income for MLS purposes includes taxable income,
          reportable fringe benefits, total net investment losses and reportable
          super contributions, among other listed items.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Private health insurance rebate
        url: "https://www.ato.gov.au/individuals-and-families/medicare-and-private-health-insurance/private-health-insurance-rebate"
        access_date: "2026-05-13"
