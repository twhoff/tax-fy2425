  - id: wfh-fixed-rate-2024-25
    title: Working from home fixed-rate method
    worksheet_refs:
      - "260315 - Deduction Review Worksheet.md:84"
      - "260315 - Deduction Review Worksheet.md:322"
      - "260315 - Deduction Review Worksheet.md:512"
    downstream_issues:
      - TaxFY2425-c6j.4
      - TaxFY2425-c6j.6
      - TaxFY2425-c6j.9
    questions_to_answer:
      - What is the FY2024-25 cents-per-hour rate?
      - Which expenses are included in the fixed rate and cannot be claimed again?
      - What WFH hour records are required?
      - Which home-office items can be claimed separately?
    sources:
      - authority: ATO
        title: Fixed rate method
        url: "https://www.ato.gov.au/individuals-and-families/income-deductions-offsets-and-records/deductions-you-can-claim/work-related-deductions/working-from-home-expenses/fixed-rate-method"
        access_date: "2026-05-13"
        fy_relevance: "Page text explicitly mentions the 2024-25 rate. Last updated 6 May 2025."
        exact_claim: >-
          For 2024-25 the fixed-rate method uses 70 cents per work hour. The rate
          includes home/mobile internet, phone usage, energy, stationery and
          computer consumables, and these covered expenses cannot also be claimed
          separately. The ATO page also states actual WFH hours must be recorded
          and estimates are not acceptable.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Working from home expenses
        url: "https://www.ato.gov.au/individuals-and-families/income-deductions-offsets-and-records/deductions-you-can-claim/work-related-deductions/working-from-home-expenses"
        access_date: "2026-05-13"
        fy_relevance: "General WFH page, last updated 6 May 2025."
        exact_claim: >-
          To claim WFH expenses, the taxpayer must work from home to fulfil
          employment duties, incur additional running expenses, and keep records.
          The page identifies fixed-rate and actual-cost methods and says the
          fixed-rate method allows separate claims for expenses not covered by the
          fixed rate, such as decline in value of depreciating assets.
        confidence: high
        status: source_fetched

