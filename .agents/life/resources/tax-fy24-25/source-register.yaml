      - Which income and concessional contribution amounts are included?
      - Is the assessment separate from the income tax return?
    sources:
      - authority: ATO
        title: Division 293 tax on concessional contributions by high-income earners
        url: "https://www.ato.gov.au/individuals-and-families/super-for-individuals-and-families/super/growing-and-keeping-track-of-your-super/caps-limits-and-tax-on-super-contributions/division-293-tax-on-concessional-contributions-by-high-income-earners"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO Division 293 page, last updated 8 December 2025, used for FY2024-25 high-income super tax review."
        exact_claim: >-
          Division 293 tax is an additional tax on super contributions for
          individuals whose combined income and concessional contributions for
          Division 293 purposes exceed $250,000. The tax is 15% of the excess
          over the threshold or the taxable super contributions, whichever is
          less. The ATO determines Division 293 income from the tax return and
          super contributions from fund reporting, and sends a Division 293
          notice after receiving both the income tax return and contribution
          information from the super fund. Division 293 income is based on the
          MLS income calculation, disregarding reportable superannuation
          contributions.
        confidence: high
        status: source_fetched

