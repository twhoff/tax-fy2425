  - id: employee-work-expenses-tools-software-self-education
    title: Employee software, tools, equipment, self-education, and professional reading
    worksheet_refs:
      - "260315 - Deduction Review Worksheet.md:67"
      - "260315 - Deduction Review Worksheet.md:105"
      - "260315 - Deduction Review Worksheet.md:134"
      - "260315 - Deduction Review Worksheet.md:178"
      - "260315 - Deduction Review Worksheet.md:477"
    downstream_issues:
      - TaxFY2425-c6j.4
      - TaxFY2425-c6j.6
      - TaxFY2425-c6j.8
    questions_to_answer:
      - Which software/subscriptions are sufficiently connected to employment duties?
      - Which assets are immediately deductible, depreciated, or apportioned?
      - What source supports self-education and professional reading claims?
    sources:
      - authority: ATO
        title: Working from home expenses - fixed rate method
        url: "https://www.ato.gov.au/individuals-and-families/income-deductions-offsets-and-records/deductions-you-can-claim/work-related-deductions/working-from-home-expenses/fixed-rate-method"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO WFH fixed-rate page for FY2024-25."
        exact_claim: >-
          The fetched page says technology and office furniture such as chairs,
          desks, computers and bookshelves can be claimed separately from the WFH
          fixed rate, generally as depreciating assets, and work/private use must
          be apportioned.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Self-education expenses
        url: "https://www.ato.gov.au/individuals-and-families/your-tax-return/instructions-to-complete-your-tax-return/mytax-instructions/2025/deductions/work-related-expenses/work-related-self-education-expenses"
        access_date: "2026-05-13"
        fy_relevance: "myTax 2025 instructions published 2 June 2025 for work-related self-education expenses."
        exact_claim: >-
          To claim work-related self-education expenses, the taxpayer must have
          incurred the cost, not been reimbursed, have a direct connection to
          earning employment income, and keep a record. The expense must have a
          sufficient connection to employment activities by maintaining or
          improving specific skills or knowledge used in then-current employment,
          or leading/being likely to lead to increased income from that
          employment. Expenses are not deductible if they relate only in a
          general way to current employment or enable new employment.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Computers, laptops and software
        url: "https://www.ato.gov.au/individuals-and-families/income-deductions-offsets-and-records/deductions-you-can-claim/work-related-deductions/tools-computers-and-items-you-use-for-work/computers-laptops-and-software"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO employee work-related computer/software page, last updated 16 June 2025."
        exact_claim: >-
          To claim computers, laptops and software, the taxpayer must incur the
          cost, use the item to perform work duties, determine whether the cost is
          deductible immediately or through decline in value over effective life,
          keep records of expenses and use, and apportion any private use. The
          page lists subscriptions and software programs as claimable when used
          for work, and says items costing more than $300 are generally claimed
          through decline in value.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Books, periodicals and digital information
        url: "https://www.ato.gov.au/individuals-and-families/income-deductions-offsets-and-records/deductions-you-can-claim/work-related-deductions/tools-computers-and-items-you-use-for-work/books-periodicals-and-digital-information"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO employee work-related books/digital information page, last updated 16 June 2025."
        exact_claim: >-
          To claim books, periodicals and digital information, the taxpayer must
          use them in connection with current work duties, keep records, and
          apportion private use. The page says newspapers, news services and
          other news subscriptions, and magazines, are generally private expenses
          unless the taxpayer can show a sufficient connection between specific
          employment duties and the content of the specific publication; incidental
          work use is not deductible.
        confidence: high
        status: source_fetched
      - authority: ATO
        title: Depreciating assets you use for work
        url: "https://www.ato.gov.au/individuals-and-families/income-deductions-offsets-and-records/deductions-you-can-claim/work-related-deductions/tools-computers-and-items-you-use-for-work/depreciating-assets-you-use-for-work"
        access_date: "2026-05-13"
        fy_relevance: "Current ATO employee depreciating-asset page, last updated 16 June 2025."
        exact_claim: >-
          Depreciating assets are assets with a limited effective life that can
          reasonably be expected to lose value over time. The cost is capital and
          is generally claimed through decline in value unless an immediate
          deduction is available for eligible assets costing $300 or less. The
          taxpayer must apportion work/private use and keep records showing how
          the work-related use was calculated.
        confidence: high
        status: source_fetched

