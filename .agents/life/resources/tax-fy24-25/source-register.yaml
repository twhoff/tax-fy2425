          the relevant lower and upper family thresholds. For 2024-25 the lower
          family threshold is $45,907, increased by $4,216 per dependent child,
          and the upper family threshold is $57,383, increased by $5,270 per
          dependent child. The reviewed scenarios are well above these
          thresholds, so the full 2% Medicare levy is used for deterministic
          checks.
