# yaml-language-server: $schema=../schemas/workflow.schema.json

name: Commit & Push
description: >-
  Commit all local changes and push to remote. Automatically groups changes
  by Beads epics/issues and project concerns, generates commitizen-format
  messages (WITHOUT using the cz tool), runs quality gates, and pushes.
  Success criteria: git status shows clean working tree, up to date with origin.

preflight:
  - prompt: >-
      Run `git status --porcelain` and `git diff --stat` to capture the full
      set of uncommitted changes (staged, unstaged, and untracked). If the
      working tree is already clean, report "nothing to commit" and STOP —
      skip all remaining steps.
    category: discovery

  - prompt: >-
      Run `bd list --status=open --json` and `bd list --status=in_progress --json`
      to load all active Beads issues. Also run `bd ready` for context. Build
      a lookup of issue IDs to titles/types so you can associate changes with
      issues in the next step.
    category: discovery
    requires:
      - bd CLI

steps:
  - prompt: >-
      Verify that every change group will have a Beads issue ID for its
      commit message. The commit-msg hook requires a <issue-id> ID in the
      first line of every commit.

      1. Review the active issues loaded in the previous step.
      2. For each logical group of changes, identify which Beads issue
         it belongs to.
      3. If any change group has NO associated Beads issue:
         a. Create one with `bd create "<description>" -t task -p 2`
         b. Record the new issue ID
      4. Confirm: every change group now has a trackable issue ID.

      This step prevents the commit step from failing due to missing
      issue IDs. Do NOT proceed until every group is covered.
    category: quality
    requires:
      - bd CLI

  - prompt: >-
      Analyse the changed files from preflight and group them into logical
      commits. Each group should represent ONE coherent concern. Use this
      priority order for grouping:


      1. **By Beads issue** — if a change directly relates to an open/in-progress
         Beads issue, group it under that issue ID.

      2. **By epic** — if multiple changes relate to the same epic, group them
         under the epic.

      3. **By project concern** — group remaining changes by their domain:
         schemas, scripts, workflows, hooks, docs, config, legal, prompts, etc.


      For each group, record: (a) the list of files, (b) the Beads issue ID
      (or epic ID, or "untracked"), (c) a short summary of what changed.
      Output the plan as a numbered list. Aim for the FEWEST commits that
      still maintain logical separation — do NOT over-split.
    category: discovery

  - prompt: >-
      Review the commit plan. For each group, verify:

      - Every changed file is assigned to exactly one group (no orphans).

      - No group mixes unrelated concerns.

      - The grouping is efficient — merge groups that share the same issue
        or concern.


      If adjustments are needed, update the plan. Then confirm the final
      commit order (dependencies first, dependents after).
    category: quality

  - prompt: >-
      For each commit group (in order), execute:


      1. `git add <files>` — stage ONLY the files in this group.

      2. Compose a commitizen-format commit message. Format:
         `<type>(<scope>): <subject> (<issue-id>)`
         where:
         - **type**: feat, fix, docs, style, refactor, test, chore, ci, perf, build
         - **scope**: optional, the project area (e.g. schemas, hooks, scripts)
         - **subject**: imperative, lowercase, no period, max 72 chars
         - **issue-id**: the Beads issue ID (e.g. <issue-2026>-02-22 or the project-abc).
           If no specific issue exists, use today's all-agents epic ID.
         - **body** (optional): bullet list of what changed, wrapped at 72 chars.

         Do NOT use the `cz` tool. Generate the message directly.

      3. `git commit -m "<message>"` — commit with the composed message.

      4. Verify the commit succeeded before moving to the next group.


      IMPORTANT: The commit-msg hook requires a Beads issue ID (<issue-id>) in
      the first line. Every commit message MUST include one.
    category: delivery
    requires:
      - bd CLI

  - prompt: >-
      Run quality gates on the committed changes:

      - `python scripts/validate_schemas.py` — all schemas must pass.

      - `get_errors` — zero problems policy, no lint/type errors allowed.

      If any gate fails, fix the issue with an additional commit (following
      the same commitizen format and issue-ID rules), then re-run gates
      until all pass.
    category: quality

postflight:
  - prompt: >-
      Push all commits to remote:

      ```
      git pull --rebase
      bd dolt pull
      bd dolt push
      git push
      ```

      Then verify: `git status` MUST show "working tree clean" and
      "up to date with origin". If push fails, resolve conflicts and
      retry until it succeeds. NEVER stop before pushing.
    requires:
      - bd CLI

  - prompt: >-
      Report a summary: number of commits made, files changed, issues
      referenced. Confirm success criteria: clean working tree, pushed
      to origin.
